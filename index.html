<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WB dashboard — Лист1</title>
<style>
    :root {
        --grid: #d9d9d9;
        --text: #000;
        --muted: #444;
        --bg: #fff;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 28px; background: var(--bg); color: var(--text);
        font-family: Arial, Helvetica, sans-serif; font-size: 14px;
    }
    .page { max-width: 1500px; margin: 0 auto; }
    .top { margin-bottom: 20px; }
    h1 { margin: 0 0 6px; font-size: 22px; font-weight: 700; }
    .meta { color: var(--muted); font-size: 13px; }
    .meta.is-error { color: #b6402e; }
    .rate-badge {
        display: inline-block; background: #eef6ff; color: #1a5fb4;
        border: 1px solid #cfe3ff; border-radius: 4px; padding: 2px 8px;
        font-size: 12px; font-weight: 400; vertical-align: middle;
    }
    .tables-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    .summary-block { min-width: 0; }
    h2 { margin: 0 0 8px; text-align: center; font-size: 17px; font-weight: 700; }
    .summary-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; }
    .summary-table th, .summary-table td {
        border: 1px solid var(--grid); padding: 8px 9px; text-align: center;
        vertical-align: middle; font-size: 14px; line-height: 1.15; white-space: nowrap;
    }
    .summary-table th { font-weight: 400; background: #fff; }
    .summary-table th span { font-size: 11px; }
    .summary-table td { font-weight: 700; }
    .summary-table .date-cell, .summary-table .date-head, .summary-table tfoot td:first-child {
        font-weight: 400; text-align: left; width: 104px;
    }
    .summary-table tfoot td { border-top: 3px solid #000; font-weight: 700; background: #fafafa; }
    .summary-block:first-child { border-left: 2px solid #000; padding-left: 0; }
    .summary-block:first-child .summary-table { border-left: 2px solid #000; }
    .summary-block:last-child { border-left: 2px solid #000; border-right: 2px solid #000; padding-left: 0; padding-right: 0; }
    .summary-block:last-child .summary-table { border-left: 2px solid #000; border-right: 2px solid #000; }
    .empty-note { text-align: center; color: var(--muted); font-style: italic; padding: 24px; }
    @media (max-width: 1200px) {
        body { padding: 16px; }
        .tables-wrap { grid-template-columns: 1fr; gap: 32px; }
    }
</style>
</head>
<body>
    <main class="page">
        <div class="top">
            <h1>WB dashboard — Лист1</h1>
            <div class="meta" id="metaLine">Подключение к Firestore…</div>
        </div>
        <div class="tables-wrap" id="tablesWrap">
            <p class="empty-note">Загрузка данных…</p>
        </div>
    </main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const FIREBASE_CONFIG = {"apiKey": "AIzaSyCbiW-rv05DdI_Y5a5WtCCyuzA8BgjD6rk", "authDomain": "task-ebb73.firebaseapp.com", "projectId": "task-ebb73", "storageBucket": "task-ebb73.firebasestorage.app", "messagingSenderId": "1031614791847", "appId": "1:1031614791847:web:a4d2c9e0b4299af979db82"};
  const ROWS_COLLECTION = "wb_dashboard_rows";
  const META_DOC_PATH = "wb_dashboard_meta/latest";
  const TITLE_OUR = "rus 633 sku";
  const TITLE_ALL = "все sku";

  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();

  function fmtInt(n){
    return Math.round(n).toLocaleString("ru-RU").replace(/,/g, " ");
  }
  function fmtPercent(num, den){
    if(!den) return "0%";
    return Math.round((num/den)*100) + "%";
  }
  function safeDiv(num, den){
    if(!den) return 0;
    return num/den;
  }
  function fmtDate(str){
    // str: YYYY-MM-DD
    const parts = str.split("-");
    if(parts.length !== 3) return str;
    return parts[2] + "." + parts[1] + "." + parts[0];
  }

  function buildTable(title, rows, modeKey){
    let bodyRows = "";
    const totals = { order_count:0, order_sum:0, buyout_count:0, buyout_sum:0, ads_sum:0 };
    const rateSamples = [];

    rows.forEach(function(row){
      const m = row[modeKey];
      if(!m) return;
      totals.order_count += m.order_count;
      totals.order_sum   += m.order_sum;
      totals.buyout_count+= m.buyout_count;
      totals.buyout_sum  += m.buyout_sum;
      totals.ads_sum      += m.ads_sum;
      rateSamples.push(m.buyout_rate || 0);

      const drr = fmtPercent(m.ads_sum, m.buyout_sum);
      const adsPerSale = fmtInt(safeDiv(m.ads_sum, m.buyout_count));

      bodyRows +=
        '<tr>' +
          '<td class="date-cell">' + fmtDate(row.date) + '</td>' +
          '<td>' + fmtInt(m.order_count) + '</td>' +
          '<td>' + fmtInt(m.order_sum) + '</td>' +
          '<td>' + fmtInt(m.buyout_count) + '</td>' +
          '<td>' + fmtInt(m.buyout_sum) + '</td>' +
          '<td>' + fmtInt(m.ads_sum) + '</td>' +
          '<td>' + drr + '</td>' +
          '<td>' + adsPerSale + '</td>' +
        '</tr>';
    });

    const totalDrr = fmtPercent(totals.ads_sum, totals.buyout_sum);
    const totalAdsPerSale = fmtInt(safeDiv(totals.ads_sum, totals.buyout_count));

    let rateLabel = "—";
    if(rateSamples.length){
      const rateMin = Math.min.apply(null, rateSamples) * 100;
      const rateMax = Math.max.apply(null, rateSamples) * 100;
      rateLabel = Math.round(rateMin) === Math.round(rateMax)
        ? Math.round(rateMin) + "%"
        : Math.round(rateMin) + "–" + Math.round(rateMax) + "%";
    }

    return (
      '<section class="summary-block">' +
        '<h2>' + title + ' <span class="rate-badge" id="rateBadge_' + modeKey + '">% выкупа (скользящий): ' + rateLabel + '</span></h2>' +
        '<table class="summary-table">' +
          '<thead><tr>' +
            '<th class="date-head"></th>' +
            '<th>Заказали,<br>шт</th>' +
            '<th>Заказали,<br>руб</th>' +
            '<th>Продаж<br><span>(прогноз)</span> шт</th>' +
            '<th>Продаж<br><span>(прогноз)</span> руб</th>' +
            '<th>Реклама,<br>руб.</th>' +
            '<th>ДРР <span>общ (по<br>продажам)</span></th>' +
            '<th>Реклама на<br>одну<br>продажу, руб</th>' +
          '</tr></thead>' +
          '<tbody>' + bodyRows + '</tbody>' +
          '<tfoot><tr>' +
            '<td>Итого</td>' +
            '<td>' + fmtInt(totals.order_count) + '</td>' +
            '<td>' + fmtInt(totals.order_sum) + '</td>' +
            '<td>' + fmtInt(totals.buyout_count) + '</td>' +
            '<td>' + fmtInt(totals.buyout_sum) + '</td>' +
            '<td>' + fmtInt(totals.ads_sum) + '</td>' +
            '<td>' + totalDrr + '</td>' +
            '<td>' + totalAdsPerSale + '</td>' +
          '</tr></tfoot>' +
        '</table>' +
      '</section>'
    );
  }

  function render(rows){
    const wrap = document.getElementById("tablesWrap");
    if(!rows.length){
      wrap.innerHTML = '<p class="empty-note">Нет данных за период. Проверь, что push_dashboard_to_firebase.py запускался.</p>';
      return;
    }
    rows.sort(function(a,b){ return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });
    wrap.innerHTML =
      buildTable(TITLE_OUR, rows, "our") +
      buildTable(TITLE_ALL, rows, "all");
  }

  function setMeta(text, isError){
    const el = document.getElementById("metaLine");
    el.textContent = text;
    el.classList.toggle("is-error", !!isError);
  }

  let latestRows = [];
  let metaInfo = null;

  function refreshMetaLine(){
    if(!metaInfo){
      setMeta("Обновлено: " + new Date().toLocaleString("ru-RU"));
      return;
    }
    const periodText = fmtDate(metaInfo.period_from) + " — " + fmtDate(metaInfo.period_to);
    let generatedText = "—";
    if(metaInfo.generated_at && metaInfo.generated_at.toDate){
      generatedText = metaInfo.generated_at.toDate().toLocaleString("ru-RU");
    }
    setMeta("Период: " + periodText + " (последние 30 дней) · Обновлено: " + generatedText);
  }

  db.collection(ROWS_COLLECTION).onSnapshot(function(snapshot){
    latestRows = snapshot.docs.map(function(doc){ return doc.data(); });
    render(latestRows);
    refreshMetaLine();
  }, function(error){
    console.error("Firestore sync error:", error);
    setMeta("Нет доступа к данным — проверь правила Firestore (Rules)", true);
  });

  db.doc(META_DOC_PATH).onSnapshot(function(doc){
    metaInfo = doc.exists ? doc.data() : null;
    refreshMetaLine();
  }, function(error){
    console.error("Firestore meta sync error:", error);
  });
</script>
</body>
</html>
